name: Translate repository to English

on:
  push:
    branches: [agent/translate-chinese-to-english]

permissions:
  contents: write

jobs:
  translate:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/translate-chinese-to-english
          fetch-depth: 0
      - name: Translate Chinese text without changing code interfaces
        run: python scripts/translate_chinese_to_english.py
      - name: Validate Python syntax
        run: python -m compileall -q .
      - name: Verify no Chinese text remains
        run: grep -Fxq 'TOTAL_MATCHING_LINES=0' CHINESE_SCAN.txt
      - name: Remove temporary translation helpers
        run: |
          rm -f CHINESE_SCAN.txt
          rm -f scripts/translate_chinese_to_english.py
          rm -f .github/workflows/scan-chinese.yml
      - name: Commit translated repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Translate all Chinese repository content to English [skip ci]"
          git push
