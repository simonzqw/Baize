name: Audit AutoDL source sync

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  audit:
    if: github.head_ref == 'agent/sync-autodl-latest'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Build repository source manifest
        shell: python
        run: |
          import ast
          import csv
          import hashlib
          import pathlib
          import subprocess

          excluded = {
              '.github/workflows/audit-autodl-sync.yml',
              'REPO_AUDIT_MANIFEST.csv',
              'AUTODL_SYNC_REQUEST.txt',
              'scripts/apply_autodl_sync.py',
              'SYNC_VALIDATION.txt',
          }
          names = subprocess.check_output(['git', 'ls-files', '-z']).decode().split('\0')
          rows = []
          for name in names:
              if not name or name in excluded:
                  continue
              path = pathlib.Path(name)
              try:
                  raw = path.read_bytes()
              except OSError:
                  continue
              sha = hashlib.sha256(raw).hexdigest()
              ast_sha = ''
              if path.suffix == '.py':
                  try:
                      tree = ast.parse(raw.decode('utf-8'))
                      for node in ast.walk(tree):
                          if isinstance(node, ast.Constant) and isinstance(node.value, str):
                              node.value = '<STRING>'
                      normalized = ast.dump(tree, annotate_fields=True, include_attributes=False)
                      ast_sha = hashlib.sha256(normalized.encode()).hexdigest()
                  except Exception:
                      ast_sha = 'PARSE_ERROR'
              rows.append((name, len(raw), sha, ast_sha))
          with open('REPO_AUDIT_MANIFEST.csv', 'w', newline='', encoding='utf-8') as handle:
              writer = csv.writer(handle)
              writer.writerow(['relative_path', 'size_bytes', 'sha256', 'normalized_ast_sha256'])
              writer.writerows(sorted(rows))
      - name: Commit repository manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add REPO_AUDIT_MANIFEST.csv
          git commit -m "Add repository audit manifest [skip ci]" || exit 0
          git push
