name: Install experiment notebooks

on:
  push:
    branches:
      - notebooks/add-experiment-notebooks

permissions:
  contents: write

jobs:
  install-notebooks:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract notebook archive
        shell: bash
        run: |
          set -euo pipefail
          cat .notebook_payload/part*.b64 > /tmp/baize_notebooks.tar.xz.b64
          base64 --decode /tmp/baize_notebooks.tar.xz.b64 > /tmp/baize_notebooks.tar.xz
          tar -xJf /tmp/baize_notebooks.tar.xz -C .
          rm -rf .notebook_payload
          rm -f /tmp/baize_notebooks.tar.xz.b64 /tmp/baize_notebooks.tar.xz

      - name: Commit notebooks
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add organized experiment notebooks"
          git push origin "HEAD:${{ github.ref_name }}"
